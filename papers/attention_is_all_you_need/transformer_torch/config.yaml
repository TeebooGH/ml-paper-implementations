# Transformer base model hyperparameters from "Attention Is All You Need"
d_model: 512                # Table 2
vocab_size: 37000           # Section 5.1 (WMT EN-DE)
max_seq_length: 100         # Not explicit, but 100 is common
num_layers: 6               # Table 2
num_heads: 8                # Table 2
d_ff: 2048                  # Table 2 (Feed-forward inner layer dimension)
dropout: 0.1                # Table 2
attention_dropout: 0.1      # Table 2
activation: relu            # Section 3.3
optimizer: adam             # Section 5.3
adam_beta1: 0.9             # Section 5.3
adam_beta2: 0.98            # Section 5.3
adam_epsilon: 1e-9          # Section 5.3
lr_scheduler: transformer   # Section 5.3 (custom schedule)
warmup_steps: 4000          # Section 5.3
label_smoothing: 0.1        # Section 5.4
batch_size: 4096            # Section 5.2 (tokens per batch)